<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>영화토론 페이지</title>
    <link rel="stylesheet" href="chat.css">
</head>
<body>
    
     <div class="wrap">
        <h1>고질라 콩 뉴엠파이어</h1>
            <div class="chat ch1">
                <div class="icon"><img src="./img/water.avif" alt=""></div>
                <div class="textbox">안녕하세요. 반갑습니다.</div>
            </div>
            <div class="chat ch2">
                <div class="icon"><img src="./img/logo3.png" alt=""></div>
                <div class="textbox">안녕하세요 영화 어떻게 보셨나요?</div>
            </div>
            <div class="chat ch1">
                <div class="icon"><img src="./img/water.avif" alt=""></div>
                <div class="textbox">저는 좋아하는 영화감독이라서 너무 재밌게 봤어요</div>
            </div>
            <div class="chat ch1">
                <div class="icon"><img src="./img/water.avif" alt=""></div>
                <div class="textbox">재밌게 보셨나요?</div>
            </div>
            <div class="chat ch2">
                <div class="icon"><img src="./img/logo3.png" alt=""></div>
                <div class="textbox">아.. 저는 전작은 재밌게 봤는데 이번작품은 너무 지루하더라고요</div>
            </div>
            <div class="chat ch2">
                <div class="icon"><img src="./img/logo3.png" alt=""></div>
                <div class="textbox">그래도 러닝타임 1시간까지는 재밌었는데 그뒤부터는 지루해서 휴대폰으로 시간을 확인하게 되더라고요 </div>
            </div>
            <div class="chat ch1">
                <div class="icon"><img src="./img/water.avif" alt=""></div>
                <div class="textbox">아이고 그럴수 있죠</div>
            </div>
            <div class="chat ch1">
                <div class="icon"><img src="./img/water.avif" alt=""></div>
                <div class="textbox">그래도 얘기하다보면 재밌는점을 찾을수 있죠!</div>
            </div>
            <div class="chat ch3">
                <div class="icon"><img src="./img/logo4.jpg" alt=""></div>
                <div class="textbox">저도 재밌게 봤습니다 펑펑 터지는게 좋더라고요</div>
            </div>
            <div class="chat ch2">
                <div class="icon"><img src="./img/logo3.png" alt=""></div>
                <div class="textbox">그건 맞아요 ㅋㅋ </div>
            </div>
        </div>
    <script src="app.js"></script>
</body>
</html>
