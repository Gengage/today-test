<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>폼 태그</title>
    <link rel="stylesheet" href="test.css">
    <style>
        textarea{
            resize:none
        }
    </style>
</head>
<body>
    <h1>회원가입 페이지</h1>
    <form action="server.js" method = "get">
        <fieldset>
        <legend>필수 사항</legend>
        <table> <!-- 선에 맞춰서 입력창 제작 -->
            <tr>
                <td><label for="username">사용자 이름: </label></td>
                <td><input type="text" placeholder="아이디를 입력하세요." id="username" required></td>
            </tr>
            <tr>
                <td><label for="useremail">이메일 주소:</label></td>
                <td><input type="email" placeholder="이메일을 입력하세요" id="useremail" name="useremail"required></td>
            </tr>
            <tr>
                <td><label for="userpassword">사용자 비밀번호: </label></td>
                <td><input type="password" placeholder="비밀번호를 입력하세요." id="userpassword" required></td>
            </tr>
        </table>
    </fieldset>
    <fieldset>
        <legend>옵션사항</legend>
        <p>
            <label for="address">주소</label>
            <select name="" id="address">
            <option value="seoul">서울특별시</option>
            <option value="busan">부산광역시</option>
            <option value="deagu">대구광역시</option>
        </select>
        </p>
        <p>
            <span>성별:</span>
            <label for="male">남자</label>
            <input type="radio" id="male" name="gender" value="남성">
            <label for="female">여자</label>
            <input type="radio" id="female" name="gender" value="여성">
        </p>
        <p>
            <span>장르:</span>
            <label for="html">액션</label>
            <input type="checkbox" id="html" name="html" value="HTML"></input>
            <label for="css">드라마</label>
            <input type="checkbox" id="css" name="css" value="CSS"></input>
            <label for="javascript">멜로</label>
            <input type="checkbox" id="javascript" name="javascript" value="JAVASCRIPT"></input>

        </p>
        <p>
            <label for="message">인사말</label>
            <textarea name="message" id="message" cols="30" rows="10"></textarea>
        </p>
        <p>
            <label for="profile">프로필 사진</label>
            <input type="file" id = "profile" name="profile" accept="image/png, image/jpeg">
        </p>
    </fieldset>
        <p>
        <input type="submit" value = "가입하기">
    </p>
    </form>

</body>
</html>
